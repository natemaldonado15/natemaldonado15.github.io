timezone: "America/New_York"

# Hero Section
name: "Nathan Maldonado"
headline: "Mechanical Engineer | Simulation, Prototyping, and Manufacturing Development"
description: >-
  Mechanical Engineering M.S. candidate at Worcester Polytechnic Institute with experience
  in nonlinear simulation, experimental validation, precision grinding, additive-manufacturing
  post-processing, and rapid prototype development. Former Research Engineer at Saint-Gobain
  Abrasives, where I supported aerospace grinding trials, vibration root-cause investigations,
  and manufacturing process improvements. My graduate research develops a force-controlled
  FEM-SPH model for HydroFlex polishing of additively manufactured metal internal channels.

